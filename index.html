<!doctype html>
<html lang="es" style="background:#05050A">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Caja Familiar">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0908">
<title>Caja Familiar</title>
<style>
:root{--bg:#05050A;--surface:#0F0F1E;--border:#2A2A4A;--text:#F0F0FF;--muted:#7C7CA8;--gasto:#FF2E9A;--ingreso:#00F0FF}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{height:100%;background:var(--bg)}body{margin:0;min-height:100dvh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:430px;margin:0 auto;min-height:100dvh;padding:20px;display:flex;flex-direction:column}.top{display:flex;justify-content:space-between;margin-bottom:14px}.ghost{background:none;border:0;color:var(--muted);font-size:22px;padding:8px}.seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#000c;padding:5px;border-radius:18px;margin-bottom:22px;border:1px solid var(--border)}.seg button{border:0;border-radius:14px;padding:14px;font-size:16px;font-weight:700;background:transparent;color:var(--muted)}.seg .active.gasto{background:var(--gasto);color:#05050A}.seg .active.ingreso{background:var(--ingreso);color:#05050A}.label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 7px 2px;font-weight:700}.chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}.chip{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1.5px solid var(--border);background:var(--surface);color:var(--text);border-radius:14px;padding:20px 10px;font-weight:700;text-align:center}.chip.active.gasto{background:var(--gasto);border-color:var(--gasto);color:#05050A}.chip.active.ingreso{background:var(--ingreso);border-color:var(--ingreso);color:#05050A}.field{margin-bottom:20px}input{width:100%;border:1.5px solid var(--border);background:var(--surface);color:var(--text);border-radius:18px;padding:15px;font-size:17px;outline:none}input:focus{border-color:var(--accent);border-width:2px}#amount{text-align:right;font-size:38px;font-weight:800;color:var(--accent);border-color:var(--accent);border-width:2px}.accept{margin-top:auto;border:0;border-radius:18px;padding:17px;font-size:18px;font-weight:800;background:var(--accent);color:#05050A}.accept:disabled{opacity:.35}.center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}.month{display:flex;align-items:center;justify-content:center;gap:18px;color:var(--muted);text-transform:uppercase;font-size:13px;margin:20px 0;font-weight:700}.month button{border:0;background:#ffffff12;color:var(--text);border-radius:999px;width:34px;height:34px;font-size:16px}.balance{font-size:58px;font-weight:900;margin:8px 0 28px}.cards{display:flex;gap:12px;width:100%}.card{flex:1;border-radius:18px;padding:16px;text-align:center;background:var(--surface);border:1.5px solid var(--border)}.card b{font-size:19px}.periodcards{display:flex;gap:10px;width:100%;margin-top:14px}.pcard{flex:1;border-radius:16px;padding:12px 8px;text-align:center;background:var(--surface);border:1.5px solid var(--border)}.pcard b{font-size:16px;color:var(--gasto);display:block;margin-top:4px}.new{width:100%;border:2px solid var(--ingreso);border-radius:18px;padding:17px;font-size:17px;font-weight:800;background:var(--surface);color:var(--ingreso);margin-top:20px}.list{overflow:auto}.day{color:var(--muted);font-size:11px;text-transform:uppercase;margin:18px 0 6px;font-weight:700}.row{display:flex;align-items:center;gap:10px;border:1.5px solid var(--border);border-bottom:0;background:var(--surface);padding:13px}.row:first-of-type{border-radius:14px 14px 0 0}.row:last-of-type{border-bottom:1.5px solid var(--border);border-radius:0 0 14px 14px}.row.one{border-radius:14px;border-bottom:1.5px solid var(--border)}.concept{flex:1;min-width:0}.concept b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:16px}.concept span{color:var(--muted);font-size:12px;font-weight:600}.money{font-weight:900;font-size:16px}.del{border:0;background:transparent;color:#FF2E9A;font-size:17px}.hidden{display:none!important}.bar{background:#ffffff12;border-radius:8px;height:8px;overflow:hidden;margin-top:6px}.barfill{height:100%;background:var(--gasto)}
</style>
</head>
<body style="background:#05050A">
<div id="app" class="app"></div>
<script>
const DEFAULT_CATS={gasto:["Alimentación y despensa","Ahorro e inversión","Seguro médico (Mapfre)","Gastos vivienda (luz,...)","Impuestos y tasas","Mascotas","Movilidad (Bus, comb...)","Restaurante, bar","Salud y farmacia","Extras"],ingreso:["Nómina","Extras"]};
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const fmt=n=>new Intl.NumberFormat('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
let tx=JSON.parse(localStorage.getItem('fb_transactions')||'[]');
let cats=JSON.parse(localStorage.getItem('fb_categories')||JSON.stringify(DEFAULT_CATS));
(function mergeCats(){let changed=false;['gasto','ingreso'].forEach(t=>{DEFAULT_CATS[t].forEach(c=>{if(!cats[t].includes(c)){cats[t].push(c);changed=true}})});if(changed)localStorage.setItem('fb_categories',JSON.stringify(cats));})();
let view='entry', type='gasto', category=cats.gasto[0], cursor={y:new Date().getFullYear(),m:new Date().getMonth()}, expandedCat=null;
const app=document.getElementById('app');
function save(){localStorage.setItem('fb_transactions',JSON.stringify(tx));localStorage.setItem('fb_categories',JSON.stringify(cats));}
function accent(){return type==='ingreso'?'#00F0FF':'#FF2E9A'}
function monthTx(){return tx.filter(t=>{let d=new Date(t.date);return d.getFullYear()===cursor.y&&d.getMonth()===cursor.m}).sort((a,b)=>new Date(b.date)-new Date(a.date))}
function totals(){let m=monthTx(), ing=m.filter(t=>t.type==='ingreso').reduce((s,t)=>s+t.amount,0), gas=m.filter(t=>t.type==='gasto').reduce((s,t)=>s+t.amount,0);return{ing,gas,balance:ing-gas}}
function startOfWeek(d){let day=(d.getDay()+6)%7;let s=new Date(d.getFullYear(),d.getMonth(),d.getDate());s.setDate(s.getDate()-day);s.setHours(0,0,0,0);return s}
function txEnRango(tipo,desde,hasta){return tx.filter(t=>t.type===tipo&&new Date(t.date)>=desde&&new Date(t.date)<hasta).reduce((s,t)=>s+t.amount,0)}
function periodTotals(){
  let now=new Date();
  let ws=startOfWeek(now), we=new Date(ws);we.setDate(ws.getDate()+7);
  let ms=new Date(now.getFullYear(),now.getMonth(),1), me=new Date(now.getFullYear(),now.getMonth()+1,1);
  let ys=new Date(now.getFullYear(),0,1), ye=new Date(now.getFullYear()+1,0,1);
  let g={semana:txEnRango('gasto',ws,we),mes:txEnRango('gasto',ms,me),anio:txEnRango('gasto',ys,ye)};
  let i={semana:txEnRango('ingreso',ws,we),mes:txEnRango('ingreso',ms,me),anio:txEnRango('ingreso',ys,ye)};
  let b={semana:i.semana-g.semana,mes:i.mes-g.mes,anio:i.anio-g.anio};
  return{gastos:g,ingresos:i,balance:b};
}
function catTotals(){let m=monthTx().filter(t=>t.type==='gasto');let byCat={};m.forEach(t=>{byCat[t.category]=(byCat[t.category]||0)+t.amount});return Object.entries(byCat).sort((a,b)=>b[1]-a[1])}
function catTx(cat){return monthTx().filter(t=>t.type==='gasto'&&t.category===cat)}
function toggleCat(cat){expandedCat=expandedCat===cat?null:cat;render()}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){app.style.setProperty('--accent',accent()); if(view==='entry') entry(); if(view==='dashboard') dashboard(); if(view==='resumen') resumen(); if(view==='settings') settings();}
function entry(){app.innerHTML=`<div class="top"><span></span><button class="ghost" onclick="view='dashboard';render()">📊</button></div><div class="seg"><button class="${type==='gasto'?'active gasto':''}" onclick="type='gasto';category=cats.gasto[0];render()">Gasto</button><button class="${type==='ingreso'?'active ingreso':''}" onclick="type='ingreso';category=cats.ingreso[0];render()">Ingreso</button></div><div class="label">Familia</div><div class="chips">${cats[type].map(c=>`<button class="chip ${c===category?'active '+type:''}" onclick="category='${esc(c)}';render()">${esc(c)}</button>`).join('')}<button class="chip" onclick="addCat()">+</button></div><div class="field"><div class="label">Concepto</div><input id="concept" placeholder="¿En qué ha sido?"></div><div class="field"><div class="label">Importe</div><input id="amount" inputmode="decimal" placeholder="0,00"></div><button id="ok" class="accept" onclick="submit()">Aceptar</button>`;document.getElementById('concept').focus();}
function submit(){let concept=document.getElementById('concept').value.trim();let amount=parseFloat(document.getElementById('amount').value.replace(',','.'));if(!concept||!amount||amount<=0)return;tx.unshift({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),type,concept,amount,category,date:new Date().toISOString()});save();view='dashboard';render()}
function addCat(){let n=prompt('Nombre de la nueva familia');if(!n)return;n=n.trim();if(!n)return;if(!cats[type].includes(n))cats[type].push(n);category=n;save();render()}
function changeMonth(d){cursor.m+=d;if(cursor.m<0){cursor.m=11;cursor.y--}if(cursor.m>11){cursor.m=0;cursor.y++}render()}
function dashboard(){let t=totals();let p=periodTotals();let col=t.balance>=0?'#00F0FF':'#FF2E9A';app.innerHTML=`<div class="top"><button class="ghost" onclick="view='resumen';render()">📈</button><button class="ghost" onclick="view='settings';render()">⚙️</button></div><div class="month"><button onclick="changeMonth(-1)">‹</button><span>${MONTHS[cursor.m]} ${cursor.y}</span><button onclick="changeMonth(1)">›</button></div><div class="center"><div class="label">Balance del mes</div><div class="balance" style="color:${col}">${t.balance<0?'−':''}${fmt(Math.abs(t.balance))} €</div><div class="cards"><div class="card"><div class="label" style="color:#00F0FF">Ingresos</div><b style="color:#00F0FF">${fmt(t.ing)} €</b></div><div class="card"><div class="label" style="color:#FF2E9A">Gastos</div><b style="color:#FF2E9A">${fmt(t.gas)} €</b></div></div><div class="periodcards"><div class="pcard"><div class="label">Semana</div><b>${fmt(p.gastos.semana)} €</b></div><div class="pcard"><div class="label">Mes</div><b>${fmt(p.gastos.mes)} €</b></div><div class="pcard"><div class="label">Año</div><b>${fmt(p.gastos.anio)} €</b></div></div></div><button class="new" onclick="view='entry';render()">+ Nuevo movimiento</button>`}
function resumen(){let rows=catTotals();let total=rows.reduce((s,[,v])=>s+v,0)||1;let p=periodTotals();let bC=k=>p.balance[k]>=0?'#00F0FF':'#FF2E9A';let html=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><button class="ghost" onclick="view='dashboard';render()">‹</button><b>Resumen de gastos</b></div><div class="label">Gastos</div><div class="periodcards" style="margin-bottom:16px"><div class="pcard"><div class="label">Semana</div><b>${fmt(p.gastos.semana)} €</b></div><div class="pcard"><div class="label">Mes</div><b>${fmt(p.gastos.mes)} €</b></div><div class="pcard"><div class="label">Año</div><b>${fmt(p.gastos.anio)} €</b></div></div><div class="label">Ingresos</div><div class="periodcards" style="margin-bottom:16px"><div class="pcard"><div class="label">Semana</div><b style="color:#00F0FF">${fmt(p.ingresos.semana)} €</b></div><div class="pcard"><div class="label">Mes</div><b style="color:#00F0FF">${fmt(p.ingresos.mes)} €</b></div><div class="pcard"><div class="label">Año</div><b style="color:#00F0FF">${fmt(p.ingresos.anio)} €</b></div></div><div class="label">Balance</div><div class="periodcards" style="margin-bottom:20px"><div class="pcard"><div class="label">Semana</div><b style="color:${bC('semana')}">${fmt(p.balance.semana)} €</b></div><div class="pcard"><div class="label">Mes</div><b style="color:${bC('mes')}">${fmt(p.balance.mes)} €</b></div><div class="pcard"><div class="label">Año</div><b style="color:${bC('anio')}">${fmt(p.balance.anio)} €</b></div></div><div class="month"><button onclick="changeMonth(-1)">‹</button><span>${MONTHS[cursor.m]} ${cursor.y}</span><button onclick="changeMonth(1)">›</button></div><div class="label">Por familia</div><div class="list">`;if(!rows.length)html+=`<p style="text-align:center;color:var(--muted)">Sin gastos este mes.</p>`;rows.forEach(([cat,amt])=>{let pct=(amt/total*100).toFixed(1);let open=expandedCat===cat;html+=`<div class="row one" style="flex-direction:column;align-items:stretch;gap:0;cursor:pointer" onclick="toggleCat('${esc(cat)}')"><div style="display:flex;justify-content:space-between;width:100%"><b>${open?'▾ ':'▸ '}${esc(cat)}</b><span style="color:#FF2E9A;font-weight:900">${fmt(amt)} €</span></div><div class="bar"><div class="barfill" style="width:${pct}%"></div></div></div>`;if(open){catTx(cat).forEach(t=>{let d=new Date(t.date).toLocaleDateString('es-ES',{day:'numeric',month:'short'});html+=`<div class="row one" style="border-left:3px solid #FF2E9A;background:#0A0A18;margin-bottom:2px" onclick="event.stopPropagation()"><div class="concept"><b>${esc(t.concept)}</b><span>${d}</span></div><div class="money" style="color:#FF2E9A">−${fmt(t.amount)} €</div><button class="del" onclick="event.stopPropagation();removeTx('${t.id}')">🗑</button></div>`})}});app.innerHTML=html+`</div>`}
function settings(){let m=monthTx();let html=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><button class="ghost" onclick="view='dashboard';render()">‹</button><b>Movimientos</b></div><div class="month"><button onclick="changeMonth(-1)">‹</button><span>${MONTHS[cursor.m]} ${cursor.y}</span><button onclick="changeMonth(1)">›</button></div><div class="list">`;if(!m.length)html+=`<p style="text-align:center;color:var(--muted)">Sin movimientos este mes.</p>`;let cur='';m.forEach((r,i)=>{let d=new Date(r.date).toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});if(d!==cur){cur=d;html+=`<div class="day">${d}</div>`}let col=r.type==='ingreso'?'#00F0FF':'#FF2E9A';html+=`<div class="row one" style="border-left:4px solid ${col}"><div class="concept"><b>${esc(r.concept)}</b><span>${esc(r.category)}</span></div><div class="money" style="color:${col}">${r.type==='ingreso'?'+':'−'}${fmt(r.amount)} €</div><button class="del" onclick="removeTx('${r.id}')">🗑</button></div>`});app.innerHTML=html+`</div>`}
function removeTx(id){if(confirm('¿Eliminar movimiento?')){tx=tx.filter(t=>t.id!==id);save();render()}}
render();
</script>
</body>
</html>
